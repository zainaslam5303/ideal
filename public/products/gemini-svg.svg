<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
  
  <style>
    /* CSS for Animations */
    
    /* 1. Main Vertical Infinite Loop */
    @keyframes slotMachineLoop {
      0% { transform: translateY(0px); }
      15% { transform: translateY(-500px); } /* Show Product 2 */
      25% { transform: translateY(-500px); } /* Pause on Product 2 */
      40% { transform: translateY(-1000px); } /* Loop back to P1 start point */
      /* Seamless transition back */
      40.1% { transform: translateY(0px); opacity: 0; }
      41% { transform: translateY(0px); opacity: 1;}
      100% { transform: translateY(0px); }
    }

    /* 2. Shine / Shimmer Effect */
    @keyframes shimmery {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(1200px); }
    }

    /* 3. Pulse Glow behind items */
    @keyframes pulse {
      0%, 100% { opacity: 0.6; r: 100; }
      50% { opacity: 1; r: 130; }
    }

    /* Assign animations to groups */
    #product-list {
      animation: slotMachineLoop 16s cubic-bezier(0.86, 0, 0.07, 1) infinite;
    }

    .shimmer-rect {
      animation: shimmery 3s linear infinite;
    }

    .glow-effect {
      animation: pulse 4s ease-in-out infinite;
    }

  </style>

  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" /> <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" /> </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#grad1)" />
  
  <circle cx="400" cy="300" class="glow-effect" fill="white" filter="blur(30px)" />
  
  <g id="product-list">
    
    <g transform="translate(400, 300)" text-anchor="middle">
      <image href="product1.png" x="-150" y="-200" width="300" height="400" />
      <text y="260" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="28" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">
        ZORDAAR CRUNCH!
      </text>
    </g>
    
    <g transform="translate(400, 800)" text-anchor="middle">
      <image href="product2.png" x="-150" y="-200" width="300" height="400" />
      <text y="260" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="28" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">
        DELICIOUSLY CREAMY!
      </text>
    </g>

    <g transform="translate(400, 1300)" text-anchor="middle">
      <image href="product1.png" x="-150" y="-200" width="300" height="400" />
    </g>

  </g>

  <g transform="translate(0, 0)">
    <rect class="shimmer-rect" width="100%" height="100%" fill="none">
       <animate attributeName="fill" from="rgba(255,255,255,0.05)" to="rgba(255,255,255,0.05)" dur="1s" repeatCount="indefinite" />
    </rect>
    <path class="shimmer-rect" d="M0,0 L300,0 L100,600 L-200,600 Z" fill="rgba(255,255,255,0.2)" />
  </g>

  <rect y="0" width="100%" height="40" fill="rgba(0,0,0,0.3)" />
  <rect y="560" width="100%" height="40" fill="rgba(0,0,0,0.3)" />
  <text x="50%" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="18">IDEAL SNACKS PRESENTS</text>
  <text x="50%" y="588" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="18">UNFORGETTABLE TASTE</text>

</svg>
